reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# rank.py reads features/features.parquet (committed to the repo, ~4MB) and
# never touches candidates.jsonl directly — see README.md for why. Pre-computation
# (precompute.py) must be run first if features.parquet needs to be regenerated;
# it has no time limit per the spec. The ranking step itself (this command)
# runs in ~1-2 seconds, measured.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.13.13"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 50
  # Breakdown: ~2 min rule-based feature extraction (honeypot/gates/career/
  # skills/behavioral/logistics scoring for 100K candidates) + ~44 min
  # bi-encoder embedding (all-MiniLM-L6-v2, 100K candidates) + ~3-5 min
  # cross-encoder reranking (BAAI/bge-reranker-base, top 500 candidates).
  # rank.py itself (the timed/graded step) has zero network or GPU-capable
  # imports — verified via `grep -n "^import\|^from" rank.py`.

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) throughout development as a pair-programming
  collaborator: architecture discussion, writing and iterating on the rule-based
  scorers (honeypot detection, career/skills/behavioral/logistics features),
  the two-stage semantic retrieval pipeline (bi-encoder + cross-encoder
  reranking), the composite ranking logic, and deterministic reasoning
  generation. All design decisions (scoring weights, what counts as a
  disqualifier, the two-stage retrieval architecture, what to cut when the
  cross-encoder token budget overflowed) were made and tested by me; Claude
  did not autonomously decide the approach. No candidate data was sent to
  any external LLM API during the actual ranking step — only used during
  development to read/discuss code and the provided JD/spec documents.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase pipeline. precompute.py (no time limit) runs once: rule-based
  scorers extract career (ML-months, title-hop, coding-gap, founding-team
  exposure), skills (6-group taxonomy with stuffer detection), behavioral
  (recency/response/GitHub/notice/saved/interview/offer from the 23 redrob
  signals), logistics (location/salary/work-mode), and honeypot (5-signal
  internal-consistency check) features for all 100K candidates. A MiniLM
  bi-encoder embeds all candidates against 5 JD-derived query vectors
  (max+mean similarity blend); the top 500 by a proxy score are then
  cross-encoded against the real JD text with BAAI/bge-reranker-base for
  higher-precision reranking — classic two-stage retrieval. rank.py (the
  timed step, ~1-2 seconds, zero network/GPU imports) loads the precomputed
  features, applies hard gates (consulting-firm fraction, domain mismatch,
  honeypot), computes a weighted composite (JD fit 42%, career 32%,
  behavioral 21%, logistics 5%) with multiplicative penalties for honeypot-
  soft/stuffer/coding-gap flags, runs a stability check across 3 alternate
  weight configurations, generates deterministic fact-grounded reasoning
  (named skill groups, company, JD-mapped concerns — no LLM call, so no
  hallucination risk), and writes the submission CSV.

